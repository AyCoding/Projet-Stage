<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/css/styles.css">
    <title>Fenêtre modale</title>
</head>
<body>
    <div class="modal">
        <div class="modal__content">
            <h1>Ajout d'un projet</h1>
            <form action="#">

                <div class="form__group">
                    <input type="text" name="title" id="title" placeholder="Titre du projet" required>
                </div>
                <div class="form__group">
                    <input type="text" name="task" id="task" placeholder="Tâches" required>
                </div>
                <div class="form__group">
                    <input type="text" name="task" id="task" placeholder="Tâches">
                </div>

                <div class="form__group form__last">
                    <button type="submit" name="submit" id="submit">Valider</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

<style>

    html,
    body {
    width: 100%;
    height: 100%;
    background-color: rgba(51, 51, 51, .1);
    display: flex;
    vertical-align: middle;
    }

    .modal {
        width: 100%;
        max-width: 90%;
        height: auto;
        max-height: 90%;
        background-color: #333;
        margin: auto;
        border-radius: 25px;
    }

    .modal__content {
        background-color: orange;
        width: 90%;
        height: 100%;
        padding: 5%;
    }

    .modal__content h1 {
        padding: 5%;
    }
    


    .form__group * {
        padding: 10px;
        margin: 5px;
        border-radius: 5px;
    }

    .form__group input {
        border: 2px solid #333;
        width: 100%;
        color: #fdfdfd;
    }

    .form__last button {
        width: 100%;
        background-color: #fdfdfd;
        display: flex;
        justify-content: center;
        font-size: 20px;
        font-weight: 700;
    }

    .form__last:hover button {
        background-color: #333;
        color: #fdfdfd;
        transition: .3s;
    }
</style>
